<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>audio-cleaner{% block title %}{% endblock %}</title>
  <script
    src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"
    integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
    crossorigin="anonymous"></script>
  <script
    src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"
    integrity="sha384-OZrRw8/Zvv0VFGJJF6TN3gABVZvvO60Xz7RWkQKAmoRe+t1dc5J/ySJvXbpL+N+Q"
    crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --bg: #111418;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #2d3743;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f4b8e;
      --success: #3fb950;
      --warning: #d29922;
      --error: #f85149;
      --running: #58a6ff;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1rem 0;
      overflow-y: auto;
    }

    .sidebar-brand {
      padding: 0 1rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      border-left: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .nav-link:hover {
      color: var(--text);
      background: var(--bg3);
    }

    .nav-link.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--bg3);
      font-weight: 600;
    }

    .nav-icon { font-size: 1rem; width: 1.2rem; text-align: center; }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      background: var(--bg2);
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 0 0 0.75rem;
    }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }

    /* ── Stat boxes ── */
    .stat { background: var(--bg3); border-radius: 6px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-size: 0.875rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { background: #2d3743; border-color: #444c56; }
    .btn:disabled { opacity: 0.45; cursor: default; }

    .btn-primary {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .btn-primary:hover { background: #1a5296; }

    .btn-danger {
      background: #3d1a1a;
      border-color: var(--error);
      color: var(--error);
    }
    .btn-danger:hover { background: #5c2020; }

    .btn-success {
      background: #1a3d1a;
      border-color: var(--success);
      color: var(--success);
    }
    .btn-success:hover { background: #1f4d1f; }

    .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.8rem; }

    /* ── Forms ── */
    label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; }
    input[type="text"], input[type="number"], input[type="file"], select, textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.45rem 0.65rem;
      font-size: 0.875rem;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }

    .form-row { margin-bottom: 1rem; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }

    /* ── Log panel ── */
    .log-panel {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #c9d1d9;
    }
    .log-panel .log-error { color: var(--error); }
    .log-panel .log-warn  { color: var(--warning); }
    .log-panel .log-info  { color: var(--accent); }

    /* ── Status badge ── */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge-idle    { background: var(--bg3); color: var(--text-muted); }
    .badge-running { background: var(--accent-dim); color: var(--running); }
    .badge-done    { background: #1a3d1a; color: var(--success); }
    .badge-error   { background: #3d1a1a; color: var(--error); }

    /* ── File list ── */
    .file-list { list-style: none; margin: 0; padding: 0; }
    .file-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .file-list li:last-child { border-bottom: none; }
    .file-size { color: var(--text-muted); font-size: 0.75rem; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    .tab-btn {
      padding: 0.55rem 1.1rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.875rem;
      margin-bottom: -1px;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    /* ── Misc ── */
    h2 { margin: 0 0 1rem; font-size: 1.1rem; }
    h3 { margin: 0 0 0.5rem; font-size: 0.95rem; }
    .text-muted { color: var(--text-muted); }
    .text-error { color: var(--error); }
    .text-success { color: var(--success); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .flex { display: flex; }
    .flex-gap { display: flex; gap: 0.5rem; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">🎵 audio-cleaner</div>
    <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
      <span class="nav-icon">📊</span> Dashboard
    </a>
    <a href="/dataset" class="nav-link {% if active_page == 'dataset' %}active{% endif %}">
      <span class="nav-icon">📁</span> Dataset
    </a>
    <a href="/training" class="nav-link {% if active_page == 'training' %}active{% endif %}">
      <span class="nav-icon">🏋️</span> Training
    </a>
    <a href="/inference" class="nav-link {% if active_page == 'inference' %}active{% endif %}">
      <span class="nav-icon">🎛️</span> Inference
    </a>
    <a href="/settings" class="nav-link {% if active_page == 'settings' %}active{% endif %}">
      <span class="nav-icon">⚙️</span> Settings
    </a>
  </nav>
  <div class="main">
    <div class="topbar">{% block topbar %}audio-cleaner{% endblock %}</div>
    <div class="content">{% block content %}{% endblock %}</div>
  </div>
</body>
</html>
